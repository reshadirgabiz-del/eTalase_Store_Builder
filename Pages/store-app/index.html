    <script>
(function () {
  if (window.__etEditor) return;
  window.__etEditor = true;
  var params = new URLSearchParams(location.search);
  var storeId = window.__RESOLVED_STORE_ID__ || params.get('store');
  if (!storeId) return;

  var KEY       = 'etalase-text-overrides-'  + storeId;
  var COLOR_KEY = 'etalase-color-overrides-' + storeId;

  /* ── localStorage (draft) ── */
  var _localText = {}, _localColors = {};
  try { _localText  = JSON.parse(localStorage.getItem(KEY)       || '{}'); } catch (e) {}
  try { _localColors = JSON.parse(localStorage.getItem(COLOR_KEY) || '{}'); } catch (e) {}

  /* merged = published file (base) + localStorage draft (on top) */
  var overrides      = Object.assign({}, _localText);
  var colorOverrides = Object.assign({}, _localColors);

  /* ── Apply color CSS variables ── */
  function applyColors(vars) {
    var el = document.getElementById('__et-colors');
    if (!el) { el = document.createElement('style'); el.id = '__et-colors'; document.head.appendChild(el); }
    var entries = Object.keys(vars).filter(function(k){ return k.startsWith('--'); });
    if (!entries.length) { el.textContent = ''; return; }
    el.textContent = ':root{' + entries.map(function(k){ return k+':'+vars[k]; }).join(';') + '}';
  }
  /* Apply local colors immediately (no fetch delay) */
  if (Object.keys(colorOverrides).length) applyColors(colorOverrides);

  /* ── Fetch published overrides file, merge ── */
  fetch('./overrides/' + storeId + '.json')
    .then(function(r) { return r.ok ? r.json() : {}; })
    .then(function(data) {
      /* file is base; local draft wins on conflict */
      overrides      = Object.assign({}, data.text   || {}, _localText);
      colorOverrides = Object.assign({}, data.colors || {}, _localColors);
      if (Object.keys(colorOverrides).length) applyColors(colorOverrides);
      /* re-apply text if instrument() already ran */
      if (Object.keys(els).length) instrument();
    })
    .catch(function() { /* keep localStorage-only state */ });

  /* ── Text click-to-edit ── */
  var sEl = document.createElement('style');
  sEl.textContent = '[data-eid]:hover{outline:2px dashed rgba(59,130,246,.75)!important;outline-offset:3px!important;cursor:pointer!important}[data-eid].eid-on{outline:2px solid #3B82F6!important;outline-offset:3px!important;background:rgba(59,130,246,.06)!important}';
  document.head.appendChild(sEl);

  var els = {}, tagCount = {};

  function instrument() {
    document.querySelectorAll('[data-eid]').forEach(function (n) { n.removeAttribute('data-eid'); n.classList.remove('eid-on'); });
    els = {}; tagCount = {};
    var TAGS = ['h1','h2','h3','h4','h5','h6','p','button','a','span','li','td','label','strong','em'];
    TAGS.forEach(function (tag) {
      document.querySelectorAll(tag).forEach(function (el) {
        var txt = el.textContent.trim();
        if (!txt || txt.length < 2) return;
        if (el.closest('script,style,noscript,code,pre,svg,[data-no-edit]')) return;
        if (el.querySelectorAll('img,video,canvas,iframe').length) return;
        tagCount[tag] = tagCount[tag] || 0;
        var eid = tag + '-' + (tagCount[tag]++);
        el.setAttribute('data-eid', eid);
        els[eid] = { el: el, orig: txt };
        el.addEventListener('click', function (e) {
          e.preventDefault(); e.stopPropagation();
          document.querySelectorAll('.eid-on').forEach(function (x) { x.classList.remove('eid-on'); });
          el.classList.add('eid-on');
          window.parent.postMessage({ type: '__EC', eid: eid, tag: tag, text: el.textContent.trim() }, '*');
        }, true);
      });
    });
    Object.keys(overrides).forEach(function (eid) {
      if (els[eid] && overrides[eid].newText !== undefined) els[eid].el.textContent = overrides[eid].newText;
    });
  }

  window.addEventListener('message', function (e) {
    if (!e.data || !e.data.type) return;
    var entry;
    if (e.data.type === '__EU') {
      entry = els[e.data.eid]; if (!entry) return;
      entry.el.textContent = e.data.text;
      overrides[e.data.eid] = { newText: e.data.text, originalText: entry.orig, tag: e.data.tag };
      try { localStorage.setItem(KEY, JSON.stringify(overrides)); } catch (_) {}
    } else if (e.data.type === '__ER') {
      entry = els[e.data.eid]; if (!entry) return;
      entry.el.textContent = entry.orig;
      delete overrides[e.data.eid];
      try { localStorage.setItem(KEY, JSON.stringify(overrides)); } catch (_) {}
    } else if (e.data.type === '__ECALL') {
      Object.keys(els).forEach(function (id) { els[id].el.textContent = els[id].orig; });
      overrides = {};
      try { localStorage.removeItem(KEY); } catch (_) {}
    } else if (e.data.type === '__ECOLOR') {
      colorOverrides = e.data.vars || {};
      applyColors(colorOverrides);
      if (Object.keys(colorOverrides).length) {
        try { localStorage.setItem(COLOR_KEY, JSON.stringify(colorOverrides)); } catch (_) {}
      } else {
        try { localStorage.removeItem(COLOR_KEY); } catch (_) {}
      }
    }
  });

  var iTimer;
  var obs = new MutationObserver(function () { clearTimeout(iTimer); iTimer = setTimeout(instrument, 300); });
  function start() { obs.observe(document.body, { childList: true, subtree: true }); setTimeout(instrument, 700); }
  if (document.body) { start(); } else { document.addEventListener('DOMContentLoaded', start); }
})();
